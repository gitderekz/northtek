<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northtek Admin - Enquiries Dashboard</title>
    <style>
        :root {
            --bg-primary: #f5f6fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #fafbfc;
            --bg-hover: #f8f9fa;
            --text-primary: #2d3436;
            --text-secondary: #636e72;
            --text-muted: #b2bec3;
            --border-color: #e8e8e8;
            --border-light: #f0f0f0;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --shadow-hover: 0 4px 20px rgba(0,0,0,0.06);
            --modal-overlay: rgba(0,0,0,0.4);
            --accent: #3d8b3d;
            --accent-hover: #357a35;
            --accent-light: #e8f5e9;
            --danger: #e74c3c;
            --danger-light: #ffebee;
            --warning: #f9a825;
            --warning-light: #fff8e1;
            --info: #1976d2;
            --info-light: #e3f2fd;
            --success: #388e3c;
            --success-light: #e8f5e9;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --bg-hover: #1a1a3e;
            --text-primary: #e4e6eb;
            --text-secondary: #b0b3b8;
            --text-muted: #6c757d;
            --border-color: #2d3748;
            --border-light: #1e2a3a;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --shadow-hover: 0 4px 20px rgba(0,0,0,0.4);
            --modal-overlay: rgba(0,0,0,0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        /* Login Page */
        .login-container {
            max-width: 420px;
            margin: 80px auto;
            padding: 48px;
            background: var(--bg-secondary);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .login-container h1 {
            color: var(--text-primary);
            margin-bottom: 32px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(61, 139, 61, 0.1);
            background: var(--bg-secondary);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(61, 139, 61, 0.25);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            color: var(--danger);
            margin-top: 12px;
            font-size: 14px;
            display: none;
            text-align: center;
        }

        /* Dashboard Layout */
        .dashboard-container {
            display: none;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-header .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 8px;
        }

        .nav-section-title {
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 2px 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent-light);
            color: var(--accent);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
            width: calc(100% - 260px);
        }

        /* Top Header */
        .top-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
            width: 100%; /* Add this */
            left: 0; /* Add this */
            right: 0; /* Add this */
        }

        .top-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .header-icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .theme-toggle {
            position: relative;
        }

        .theme-toggle .sun-icon,
        .theme-toggle .moon-icon {
            position: absolute;
            transition: all 0.3s ease;
        }

        [data-theme="dark"] .theme-toggle .sun-icon {
            opacity: 0;
            transform: rotate(180deg) scale(0);
        }

        [data-theme="light"] .theme-toggle .moon-icon {
            opacity: 0;
            transform: rotate(-180deg) scale(0);
        }

        /* User Profile Dropdown */
        .user-profile-wrapper {
            position: relative;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px 6px 6px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .user-profile:hover {
            background: var(--bg-hover);
        }

        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            min-width: 200px;
            z-index: 200;
            display: none;
            overflow: hidden;
        }

        .user-dropdown.show {
            display: block;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-dropdown-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .user-dropdown-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .user-dropdown-email {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .user-dropdown-menu {
            padding: 8px;
        }

        .user-dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .user-dropdown-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .user-dropdown-item.logout {
            color: var(--danger);
        }

        .user-dropdown-item.logout:hover {
            background: var(--danger-light);
        }

        .user-dropdown-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .user-dropdown-divider {
            height: 1px;
            background: var(--border-light);
            margin: 4px 0;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .user-role {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Content Area */
        .content-area {
            padding: 24px 32px;
        }

        /* Stats Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }

        .stat-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .stat-icon.blue { background: var(--info-light); color: var(--info); }
        .stat-icon.green { background: var(--success-light); color: var(--success); }
        .stat-icon.purple { background: #f3e5f5; color: #7b1fa2; }
        .stat-icon.orange { background: #fff3e0; color: #f57c00; }
        .stat-icon.yellow { background: var(--warning-light); color: var(--warning); }
        .stat-icon.indigo { background: #e8eaf6; color: #303f9f; }
        .stat-icon.teal { background: #e0f2f1; color: #00796b; }

        .stat-card .number {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            line-height: 1;
        }

        .stat-card h3 {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
        }

        .stat-card .stat-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Table Card */
        .enquiries-table {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .table-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--bg-primary);
        }

        .table-header h2 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .table-search {
            padding: 8px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            width: 280px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .table-search:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-secondary);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--bg-tertiary);
            padding: 14px 24px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-light);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-light);
            font-size: 14px;
            color: var(--text-primary);
        }

        tr:hover td {
            background: var(--bg-hover);
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending {
            background: var(--warning-light);
            color: var(--warning);
        }

        .status-reviewed {
            background: #eceff1;
            color: #546e7a;
        }

        .status-contacted {
            background: var(--info-light);
            color: var(--info);
        }

        .status-resolved {
            background: var(--success-light);
            color: var(--success);
        }

        .email-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .email-status.sent { color: var(--success); }
        .email-status.failed { color: var(--danger); }

        .action-buttons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .action-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            font-family: inherit;
            white-space: nowrap;
            min-width: 60px;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn-view {
            background: var(--info-light);
            color: var(--info);
        }

        .btn-view:hover {
            background: var(--info);
            color: white;
        }

        .btn-edit {
            background: var(--warning-light);
            color: var(--warning);
        }

        .btn-edit:hover {
            background: var(--warning);
            color: white;
        }

        .btn-delete {
            background: var(--danger-light);
            color: var(--danger);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 20px;
            border-top: 1px solid var(--border-light);
        }

        .pagination button {
            width: auto;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .pagination .page-info {
            padding: 8px 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--bg-secondary);
            max-width: 560px;
            margin: 60px auto;
            padding: 32px;
            border-radius: 20px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .modal-content h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .modal-content p {
            margin-bottom: 12px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .modal-content p strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-actions button {
            flex: 1;
        }

        .btn-secondary {
            background: var(--bg-primary);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
            box-shadow: none;
        }

        .logout-btn {
            background: var(--danger-light);
            color: var(--danger);
            width: auto;
            padding: 10px 20px;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        /* Loading Spinner */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #dfe6e9;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Mobile Navigation Toggle */
        .mobile-nav-toggle {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            z-index: 150;
        }

        .mobile-nav-toggle:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* Sidebar Overlay for Mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 90;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.show {
            opacity: 1;
        }

        /* Update responsive styles */
        @media (max-width: 1024px) {

            .user-info {
                display: none;
            }
            
            .user-dropdown {
                right: -10px;
            }

            .mobile-nav-toggle {
                display: flex;
            }

            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .sidebar-overlay {
                display: block;
                pointer-events: none;
            }

            .sidebar-overlay.show {
                pointer-events: auto;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .top-header {
                padding: 16px 20px;
            }

            .top-header h1 {
                font-size: 20px;
            }

            .header-subtitle {
                font-size: 12px;
            }
        }
        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .main-content {
                margin-left: 0;
                width: calc(100% );
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 1200px) {
            .action-buttons {
                flex-direction: column;
                gap: 4px;
            }
            
            .action-btn {
                width: 100%;
                min-width: unset;
            }
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }
            .table-header {
                flex-direction: column;
                gap: 12px;
            }
            .table-search {
                width: 100%;
            }
            .top-header {
                padding: 12px 16px;
            }
            .content-area {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div class="login-container" id="loginForm">
        <h1>Admin Login</h1>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>

    <script>
        // const API_URL = 'http://localhost:5000/api';
        const API_URL = 'https://northtek.onrender.com/api';
        let token = localStorage.getItem('adminToken');
        let currentPage = 'dashboard';
        const ITEMS_PER_PAGE = 10;

        // Theme Management
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Check if already logged in
        if (token) {
            showDashboard();
            navigateTo('dashboard');
        }

        // Theme Toggle
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // User Dropdown Functions
        function toggleUserDropdown(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('show');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('userDropdown');
            const userProfile = document.querySelector('.user-profile-wrapper');
            
            if (dropdown && userProfile && !userProfile.contains(event.target)) {
                dropdown.classList.remove('show');
            }
        });

        // Close dropdown on escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const dropdown = document.getElementById('userDropdown');
                if (dropdown) {
                    dropdown.classList.remove('show');
                }
            }
        });

        // Mobile Navigation Functions
        function toggleMobileNav() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
            
            // Update hamburger icon to X when open
            const toggleBtn = document.querySelector('.mobile-nav-toggle');
            if (sidebar.classList.contains('show')) {
                toggleBtn.innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                `;
            } else {
                toggleBtn.innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                `;
            }
        }

        function closeMobileNav() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            sidebar.classList.remove('show');
            overlay.classList.remove('show');
            
            // Reset hamburger icon
            const toggleBtn = document.querySelector('.mobile-nav-toggle');
            if (toggleBtn) {
                toggleBtn.innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                `;
            }
        }

        // Close mobile nav on window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth > 1024) {
                closeMobileNav();
            }
        });

        // Navigation
        function navigateTo(page) {
            currentPage = page;
            
            // Update active nav item
            document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.page === page) {
                    item.classList.add('active');
                }
            });

            // Update page title
            const titles = {
                'dashboard': 'Dashboard',
                'enquiries': 'Enquiries',
                'customers': 'Customers',
                'reports': 'Reports',
                'settings': 'Settings'
            };
            document.getElementById('pageTitle').textContent = titles[page] || 'Dashboard';

            // Close mobile navigation if open
            closeMobileNav();

            // Load page content
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';

            switch(page) {
                case 'dashboard':
                    loadDashboardPage();
                    break;
                case 'enquiries':
                    loadEnquiriesPage();
                    break;
                case 'customers':
                    loadCustomersPage();
                    break;
                case 'reports':
                    loadReportsPage();
                    break;
                case 'settings':
                    loadSettingsPage();
                    break;
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    token = data.token;
                    localStorage.setItem('adminToken', token);
                    showDashboard();
                    navigateTo('dashboard');
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() {
            // Close dropdown if open
            const dropdown = document.getElementById('userDropdown');
            if (dropdown) {
                dropdown.classList.remove('show');
            }
            
            localStorage.removeItem('adminToken');
            token = null;
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
        }

        // Dashboard Page
        async function loadDashboardPage() {
            const contentArea = document.getElementById('contentArea');
            try {
                const response = await fetch(`${API_URL}/admin/statistics`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.stats;
                    contentArea.innerHTML = `
                        <div class="stats">
                            <div class="stat-card">
                                <div class="stat-icon blue">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                    </svg>
                                </div>
                                <div class="number">${stats.total}</div>
                                <h3>Total Enquiries</h3>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon yellow">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <polyline points="12 6 12 12 16 14"></polyline>
                                    </svg>
                                </div>
                                <div class="number">${stats.pending}</div>
                                <h3>Pending</h3>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon purple">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </div>
                                <div class="number">${stats.reviewed}</div>
                                <h3>Reviewed</h3>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon green">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                        <polyline points="22,6 12,13 2,6"></polyline>
                                    </svg>
                                </div>
                                <div class="number">${stats.emailSent}</div>
                                <h3>Emails Sent</h3>
                            </div>
                        </div>
                        <div class="enquiries-table">
                            <div class="table-header">
                                <h2>Recent Enquiries</h2>
                                <input type="text" class="table-search" placeholder="Search enquiries..." onkeyup="searchEnquiries(event)">
                            </div>
                            <div class="table-wrapper" id="recentEnquiriesTable">
                                <div class="loading"><div class="spinner"></div></div>
                            </div>
                        </div>
                    `;
                    loadRecentEnquiries();
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
                contentArea.innerHTML = '<div class="empty-state"><h3>Error loading dashboard</h3></div>';
            }
        }

        async function loadRecentEnquiries(page = 1) {
            try {
                const response = await fetch(`${API_URL}/admin/enquiries?page=${page}&limit=5`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    renderEnquiriesTable('recentEnquiriesTable', data.enquiries, page, Math.ceil(data.total / 5));
                }
            } catch (error) {
                console.error('Error loading recent enquiries:', error);
            }
        }

        // Enquiries Page
        async function loadEnquiriesPage(page = 1) {
            const contentArea = document.getElementById('contentArea');
            try {
                const response = await fetch(`${API_URL}/admin/enquiries?page=${page}&limit=${ITEMS_PER_PAGE}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    contentArea.innerHTML = `
                        <div class="enquiries-table">
                            <div class="table-header">
                                <h2>All Enquiries</h2>
                                <input type="text" class="table-search" placeholder="Search enquiries..." onkeyup="searchEnquiriesPage(event)">
                            </div>
                            <div class="table-wrapper" id="allEnquiriesTable"></div>
                            <div class="pagination" id="enquiriesPagination"></div>
                        </div>
                    `;
                    renderEnquiriesTable('allEnquiriesTable', data.enquiries, page, Math.ceil(data.total / ITEMS_PER_PAGE), 'enquiriesPagination', 'loadEnquiriesPage');
                } else {
                    contentArea.innerHTML = '<div class="empty-state"><h3>No enquiries found</h3></div>';
                }
            } catch (error) {
                console.error('Error loading enquiries:', error);
                contentArea.innerHTML = '<div class="empty-state"><h3>Error loading enquiries</h3></div>';
            }
        }

        // Customers Page
        async function loadCustomersPage(page = 1) {
            const contentArea = document.getElementById('contentArea');
            try {
                const response = await fetch(`${API_URL}/admin/enquiries?page=${page}&limit=${ITEMS_PER_PAGE}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const uniqueCustomers = [];
                    const seen = new Set();
                    data.enquiries.forEach(enquiry => {
                        const key = enquiry.email;
                        if (!seen.has(key)) {
                            seen.add(key);
                            uniqueCustomers.push(enquiry);
                        }
                    });

                    const totalCustomers = data.total; // You might want to add a specific endpoint for this
                    
                    contentArea.innerHTML = `
                        <div class="enquiries-table">
                            <div class="table-header">
                                <h2>Customers</h2>
                                <input type="text" class="table-search" placeholder="Search customers..." onkeyup="searchCustomersPage(event)">
                            </div>
                            <div class="table-wrapper" id="customersTable"></div>
                            <div class="pagination" id="customersPagination"></div>
                        </div>
                    `;
                    renderCustomersTable('customersTable', uniqueCustomers, page, Math.ceil(uniqueCustomers.length / ITEMS_PER_PAGE), 'customersPagination');
                } else {
                    contentArea.innerHTML = '<div class="empty-state"><h3>No customers found</h3></div>';
                }
            } catch (error) {
                console.error('Error loading customers:', error);
                contentArea.innerHTML = '<div class="empty-state"><h3>Error loading customers</h3></div>';
            }
        }

        // Reports Page
        function loadReportsPage() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    <h3>Reports Coming Soon</h3>
                    <p>Detailed analytics and reports will be available in a future update.</p>
                </div>
            `;
        }

        // Settings Page
        function loadSettingsPage() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `
                <div class="enquiries-table">
                    <div class="table-header">
                        <h2>Settings</h2>
                    </div>
                    <div style="padding: 24px;">
                        <div class="form-group">
                            <label>Items Per Page</label>
                            <select onchange="updateSettings(event)">
                                <option value="10" ${ITEMS_PER_PAGE === 10 ? 'selected' : ''}>10</option>
                                <option value="25" ${ITEMS_PER_PAGE === 25 ? 'selected' : ''}>25</option>
                                <option value="50" ${ITEMS_PER_PAGE === 50 ? 'selected' : ''}>50</option>
                                <option value="100" ${ITEMS_PER_PAGE === 100 ? 'selected' : ''}>100</option>
                            </select>
                        </div>
                        <p style="color: var(--text-muted); font-size: 14px;">Settings are automatically saved.</p>
                    </div>
                </div>
            `;
        }

        function updateSettings(event) {
            // Update ITEMS_PER_PAGE (in a real app, save to localStorage or backend)
            localStorage.setItem('itemsPerPage', event.target.value);
            location.reload(); // Simple reload to apply
        }

        // Render Functions
        function renderEnquiriesTable(tableId, enquiries, currentPage, totalPages, paginationId = null, loadFunction = null) {
            const tableContainer = document.getElementById(tableId);
            
            if (!enquiries || enquiries.length === 0) {
                tableContainer.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <h3>No enquiries found</h3>
                    </div>
                `;
                return;
            }

            tableContainer.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Email Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${enquiries.map(enquiry => `
                            <tr>
                                <td>${new Date(enquiry.createdAt).toLocaleDateString()}</td>
                                <td>${enquiry.firstName} ${enquiry.lastName}</td>
                                <td>${enquiry.email}</td>
                                <td>${enquiry.phone || 'N/A'}</td>
                                <td><span class="status-badge status-${enquiry.status}">${enquiry.status}</span></td>
                                <td>
                                    <span class="email-status ${enquiry.emailSent ? 'sent' : 'failed'}">
                                        ${enquiry.emailSent ? '✓ Sent' : '✕ Failed'}
                                    </span>
                                </td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="action-btn btn-view" onclick="viewEnquiry(${enquiry.id})">View</button>
                                        <button class="action-btn btn-edit" onclick="editEnquiry(${enquiry.id})">Edit</button>
                                        <button class="action-btn btn-delete" onclick="deleteEnquiry(${enquiry.id})">Delete</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            // Render pagination if needed
            if (paginationId && loadFunction && totalPages > 1) {
                renderPagination(paginationId, currentPage, totalPages, loadFunction);
            }
        }

        function renderCustomersTable(tableId, customers, currentPage, totalPages, paginationId) {
            const tableContainer = document.getElementById(tableId);
            
            if (!customers || customers.length === 0) {
                tableContainer.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                        </svg>
                        <h3>No customers found</h3>
                    </div>
                `;
                return;
            }

            tableContainer.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Total Enquiries</th>
                            <th>Last Contact</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${customers.map(customer => `
                            <tr>
                                <td>${customer.firstName} ${customer.lastName}</td>
                                <td>${customer.email}</td>
                                <td>${customer.phone || 'N/A'}</td>
                                <td>1</td>
                                <td>${new Date(customer.createdAt).toLocaleDateString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            // Render pagination if needed
            if (totalPages > 1) {
                renderPagination(paginationId, currentPage, totalPages, 'loadCustomersPage');
            }
        }

        function renderPagination(paginationId, currentPage, totalPages, loadFunction) {
            const paginationContainer = document.getElementById(paginationId);
            if (!paginationContainer) return;

            let paginationHTML = '';
            
            paginationHTML += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="${loadFunction}(${currentPage - 1})">← Previous</button>`;
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    paginationHTML += `<button class="${i === currentPage ? 'active' : ''}" onclick="${loadFunction}(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    paginationHTML += '<span class="page-info">...</span>';
                }
            }
            
            paginationHTML += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="${loadFunction}(${currentPage + 1})">Next →</button>`;
            paginationHTML += `<span class="page-info">Page ${currentPage} of ${totalPages}</span>`;
            
            paginationContainer.innerHTML = paginationHTML;
        }

        // Search Functions
        function searchEnquiries(event) {
            if (event.key === 'Enter') {
                const searchTerm = event.target.value.toLowerCase();
                const rows = document.querySelectorAll('#recentEnquiriesTable tbody tr');
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(searchTerm) ? '' : 'none';
                });
            }
        }

        function searchEnquiriesPage(event) {
            if (event.key === 'Enter') {
                const searchTerm = event.target.value.toLowerCase();
                const rows = document.querySelectorAll('#allEnquiriesTable tbody tr');
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(searchTerm) ? '' : 'none';
                });
            }
        }

        function searchCustomersPage(event) {
            if (event.key === 'Enter') {
                const searchTerm = event.target.value.toLowerCase();
                const rows = document.querySelectorAll('#customersTable tbody tr');
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(searchTerm) ? '' : 'none';
                });
            }
        }

        // CRUD Operations
        async function viewEnquiry(id) {
            try {
                const response = await fetch(`${API_URL}/admin/enquiries/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const enquiry = data.enquiry;
                    document.getElementById('modalContent').innerHTML = `
                        <h2>Enquiry Details</h2>
                        <p><strong>Name:</strong> ${enquiry.firstName} ${enquiry.lastName}</p>
                        <p><strong>Email:</strong> ${enquiry.email}</p>
                        <p><strong>Phone:</strong> ${enquiry.phone || 'N/A'}</p>
                        <p><strong>Message:</strong></p>
                        <p>${enquiry.message}</p>
                        <p><strong>Status:</strong> <span class="status-badge status-${enquiry.status}">${enquiry.status}</span></p>
                        <p><strong>Notes:</strong> ${enquiry.notes || 'No notes'}</p>
                        <p><strong>Date:</strong> ${new Date(enquiry.createdAt).toLocaleString()}</p>
                        <div class="modal-actions">
                            <button onclick="closeModal()">Close</button>
                        </div>
                    `;
                    document.getElementById('enquiryModal').style.display = 'block';
                }
            } catch (error) {
                console.error('Error viewing enquiry:', error);
            }
        }

        async function editEnquiry(id) {
            try {
                const response = await fetch(`${API_URL}/admin/enquiries/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const enquiry = data.enquiry;
                    document.getElementById('modalContent').innerHTML = `
                        <h2>Edit Enquiry</h2>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="editStatus">
                                <option value="pending" ${enquiry.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="reviewed" ${enquiry.status === 'reviewed' ? 'selected' : ''}>Reviewed</option>
                                <option value="contacted" ${enquiry.status === 'contacted' ? 'selected' : ''}>Contacted</option>
                                <option value="resolved" ${enquiry.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Notes</label>
                            <textarea id="editNotes" style="width:100%; height:100px;">${enquiry.notes || ''}</textarea>
                        </div>
                        <div class="modal-actions">
                            <button onclick="updateEnquiry(${id})">Update</button>
                            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                        </div>
                    `;
                    document.getElementById('enquiryModal').style.display = 'block';
                }
            } catch (error) {
                console.error('Error editing enquiry:', error);
            }
        }

        async function updateEnquiry(id) {
            const status = document.getElementById('editStatus').value;
            const notes = document.getElementById('editNotes').value;

            try {
                const response = await fetch(`${API_URL}/admin/enquiries/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status, notes })
                });
                const data = await response.json();
                
                if (data.success) {
                    closeModal();
                    navigateTo(currentPage);
                }
            } catch (error) {
                console.error('Error updating enquiry:', error);
            }
        }

        async function deleteEnquiry(id) {
            if (confirm('Are you sure you want to delete this enquiry?')) {
                try {
                    const response = await fetch(`${API_URL}/admin/enquiries/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        navigateTo(currentPage);
                    }
                } catch (error) {
                    console.error('Error deleting enquiry:', error);
                }
            }
        }

        function closeModal() {
            document.getElementById('enquiryModal').style.display = 'none';
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('enquiryModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
